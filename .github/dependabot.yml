# Dependabot keeps dependencies up to date with automated PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python dependencies. The repo uses uv (uv.lock); Dependabot's `uv` ecosystem reads it.
  # If a run ever rejects `uv`, switch this to `pip` (reads pyproject.toml) instead.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions used by the CI and deploy workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
