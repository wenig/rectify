services:
  rectify:
    image: ghcr.io/wenig/rectify:latest
    ports:
      - "8080:8080"
    environment:
      # Required: the password you log in with. Must be set (no insecure default) —
      # compose errors out if it's missing rather than booting with a guessable one.
      OWNER_PASSWORD: ${OWNER_PASSWORD:?set OWNER_PASSWORD to a strong value}
      # LLM config (LiteLLM). Override the model for OpenAI/Ollama/etc.
      LLM_MODEL_ID: ${LLM_MODEL_ID:-anthropic/claude-sonnet-4-6}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      # Set so owner sessions survive restarts (otherwise random per boot).
      SECRET_KEY: ${SECRET_KEY:-}
      # Served + edited directory; matches the volume mount below.
      SITE_DIR: /site
    volumes:
      # Persist the site (and every edit) across restarts.
      - site:/site
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/_platform/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  site:
